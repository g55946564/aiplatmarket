<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI플랫마켓 블로그 | 지역경제 인사이트</title>
  <meta name="description" content="소상공인, 지역경제, AI 홍보, 창업 정보를 모아보는 AI플랫마켓 블로그 허브입니다.">
  <style>
    :root{--navy:#0d1f35;--red:#c0392b;--gold:#c9a84c;--green:#1a7a4a;--line:#dde2ea;--text:#1c2635}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f3f6fa;color:var(--text);line-height:1.6}
    header{background:var(--navy);color:#fff;padding:22px 18px}
    .wrap{max-width:1040px;margin:0 auto}
    .brand{font-weight:900;font-size:1.25rem}
    .brand em{color:var(--gold);font-style:normal}
    .hero{padding:28px 18px 18px;background:#fff;border-bottom:1px solid var(--line)}
    h1{margin:0 0 8px;font-size:1.55rem;color:var(--navy)}
    .lead{margin:0;color:#657184;font-size:.94rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;padding:22px 18px}
    .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;text-decoration:none;color:inherit;display:block}
    .card:hover{border-color:var(--red);box-shadow:0 8px 24px rgba(13,31,53,.08)}
    .tag{display:inline-block;font-size:.7rem;font-weight:800;color:var(--red);margin-bottom:8px}
    .ttl{font-weight:900;color:var(--navy);margin-bottom:5px}
    .txt{font-size:.84rem;color:#657184}
    .back{display:inline-block;margin:0 18px 28px;color:var(--navy);font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <header><div class="wrap brand">AI<em>PLAT</em>MARKET</div></header>
  <section class="hero"><div class="wrap">
    <h1>지역경제 인사이트</h1>
    <p class="lead">소상공인 성장, AI 홍보, 창업과 지역 생활경제 정보를 한 곳에서 정리합니다.</p>
  </div></section>
  <main class="wrap grid">
    <a class="card" href="/"><span class="tag">AI 홍보</span><div class="ttl">AI플랫마켓 홈</div><div class="txt">입점, 홍보, 지역경제 메뉴로 바로 이동합니다.</div></a>
    <a class="card" href="/paper/"><span class="tag">신문</span><div class="ttl">국민경제+ 신문</div><div class="txt">지역경제 신문과 배포 자료를 확인합니다.</div></a>
    <a class="card" href="/content/"><span class="tag">콘텐츠</span><div class="ttl">콘텐츠 허브</div><div class="txt">홍보 콘텐츠와 디지털 자료를 모아봅니다.</div></a>
    <a class="card" href="/lifemap/"><span class="tag">진로</span><div class="ttl">AI Life Platform</div><div class="txt">진로, 적성, 성장 방향을 탐색합니다.</div></a>
  </main>
  <div class="wrap"><a class="back" href="/">← 메인으로 돌아가기</a></div>
</body>
</html>
