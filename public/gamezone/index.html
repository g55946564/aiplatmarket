<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI플랫마켓 게임존</title>
  <meta name="description" content="AI플랫마켓 참여형 이벤트, 쿠폰, 미니게임을 안내하는 게임존 허브입니다.">
  <style>
    :root{--navy:#0d1f35;--gold:#c9a84c;--red:#c0392b;--line:#dde2ea}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#101827;color:#fff}
    .wrap{max-width:960px;margin:0 auto;padding:28px 18px}
    header{border-bottom:1px solid rgba(255,255,255,.16)}
    .brand{font-weight:900;color:var(--gold)}
    .hero{padding:36px 0 20px}
    h1{font-size:1.7rem;margin:0 0 8px}
    p{color:rgba(255,255,255,.72);line-height:1.7}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    .card{background:#fff;color:#1c2635;border-radius:8px;padding:16px}
    .ttl{font-weight:900;color:var(--navy);margin-bottom:5px}
    .txt{font-size:.84rem;color:#667085;line-height:1.6}
    .btn{display:inline-block;margin-top:16px;background:var(--gold);color:var(--navy);padding:11px 18px;border-radius:6px;font-weight:900;text-decoration:none}
  </style>
</head>
<body>
  <header><div class="wrap brand">AI플랫마켓 게임존</div></header>
  <main class="wrap">
    <section class="hero">
      <h1>참여형 이벤트 허브</h1>
      <p>출석, 쿠폰, 투표, 룰렛 같은 참여 기능을 메인 서비스와 연결하는 공간입니다.</p>
    </section>
    <section class="grid">
      <div class="card"><div class="ttl">출석 이벤트</div><div class="txt">방문자 재방문을 높이는 출석형 리워드.</div></div>
      <div class="card"><div class="ttl">쿠폰 참여</div><div class="txt">지역 업체 할인과 홍보 캠페인 연결.</div></div>
      <div class="card"><div class="ttl">투표/설문</div><div class="txt">지역 주민 의견과 생활경제 데이터를 수집.</div></div>
    </section>
    <a class="btn" href="/">메인에서 참여하기</a>
  </main>
</body>
</html>
