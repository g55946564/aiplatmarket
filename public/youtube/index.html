<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI플랫마켓 유튜브 센터</title>
  <meta name="description" content="지역 업체 홍보 영상, 쇼츠, AI 영상 제작을 연결하는 AI플랫마켓 유튜브 센터입니다.">
  <style>
    :root{--navy:#0d1f35;--red:#c0392b;--line:#dde2ea;--text:#1c2635}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f7f7f8;color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:24px 18px}
    header{background:#fff;border-bottom:3px solid var(--red)}
    .brand{font-weight:900;color:var(--navy)}
    h1{font-size:1.55rem;margin:22px 0 8px;color:var(--navy)}
    p{color:#667085;line-height:1.7}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:18px}
    .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px}
    .ttl{font-weight:900;color:var(--navy);margin-bottom:5px}
    .txt{font-size:.84rem;color:#667085;line-height:1.6}
    .btn{display:inline-block;margin-top:18px;background:var(--red);color:#fff;text-decoration:none;padding:11px 18px;border-radius:6px;font-weight:900}
  </style>
</head>
<body>
  <header><div class="wrap brand">AI플랫마켓 유튜브 센터</div></header>
  <main class="wrap">
    <h1>지역 업체 영상 홍보 허브</h1>
    <p>쇼츠, 인터뷰, 제품 소개, AI 영상 제작 문의를 메인 서비스와 연결합니다.</p>
    <section class="grid">
      <div class="card"><div class="ttl">AI 쇼츠 제작</div><div class="txt">짧고 빠른 지역 업체 홍보 영상 제작.</div></div>
      <div class="card"><div class="ttl">인터뷰 콘텐츠</div><div class="txt">사장님 이야기와 브랜드 신뢰도 강화.</div></div>
      <div class="card"><div class="ttl">라이브 커머스</div><div class="txt">특산품과 지역 상품 판매 연계.</div></div>
    </section>
    <a class="btn" href="/#videocenter">영상 제작 메뉴로 이동</a>
  </main>
</body>
</html>
