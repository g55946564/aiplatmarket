<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI플랫마켓 커뮤니티</title>
  <meta name="description" content="소상공인과 지역 주민이 소식, 제안, 홍보 요청을 나누는 AI플랫마켓 커뮤니티 허브입니다.">
  <style>
    :root{--navy:#0d1f35;--green:#1a7a4a;--red:#c0392b;--line:#dde2ea;--text:#1c2635}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#eef3f2;color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:24px 18px}
    header{background:#fff;border-bottom:3px solid var(--green)}
    .brand{font-weight:900;color:var(--navy)}
    .hero{padding:30px 0}
    h1{font-size:1.55rem;margin:0 0 8px;color:var(--navy)}
    p{line-height:1.7;color:#667085}
    .panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:14px}
    .actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    a.btn{display:block;text-align:center;text-decoration:none;border-radius:6px;padding:12px 14px;font-weight:800;background:var(--navy);color:#fff}
    a.btn.alt{background:var(--green)}
    a.btn.light{background:#fff;color:var(--navy);border:1px solid var(--line)}
  </style>
</head>
<body>
  <header><div class="wrap brand">AI플랫마켓 커뮤니티</div></header>
  <main class="wrap">
    <section class="hero">
      <h1>지역 소식과 제안을 나누는 공간</h1>
      <p>커뮤니티 정식 게시판 준비 전까지 주요 참여 메뉴로 빠르게 이동할 수 있는 허브입니다.</p>
    </section>
    <section class="panel actions">
      <a class="btn" href="/#community">커뮤니티 보기</a>
      <a class="btn alt" href="/#register">입점 신청</a>
      <a class="btn light" href="/#adcontact">광고 문의</a>
      <a class="btn light" href="/">메인으로</a>
    </section>
  </main>
</body>
</html>
